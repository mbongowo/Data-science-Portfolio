# pixi.toml — conda-forge environment for crypto-backtest.
# Run `pixi install` to resolve and generate pixi.lock (NOT committed here;
# the lock is machine-generated). See README for details.

[workspace]
name = "crypto-backtest"
version = "0.1.0"
description = "Rigorous backtesting: resampling, indicators, a no-look-ahead engine, honest analytics."
authors = ["Joseph Mbuh <mbuhjoe48@gmail.com>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=1.24"
pandas = ">=2.0"
pyyaml = ">=6.0"
pyarrow = ">=14.0"
polars = ">=0.20"
pyspark = ">=3.5"
matplotlib-base = ">=3.7"

[pypi-dependencies]
# Install the package itself (editable) into the environment.
crypto-backtest = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=8.0"
ruff = ">=0.6"
mypy = ">=1.10"
pre-commit = ">=3.7"
ipykernel = ">=6.29"
jupyterlab = ">=4.0"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
demo = "backtest demo --seed 0 --out outputs"
test = "pytest"
lint = "ruff check . && mypy src"
format = "ruff format ."
bars = "backtest bars --config config/strategy.yaml --ticks data/raw/BTCUSDT-trades.csv --out data/raw/BTCUSDT-1min.parquet"
run = "backtest run --config config/strategy.yaml --bars data/raw/BTCUSDT-1min.parquet --out outputs"
report = "backtest report --config config/strategy.yaml --equity outputs/equity.parquet --out outputs"
