# Pixi project manifest. Geospatial dependencies come from conda-forge, where
# the EO stack (odc-stac, rioxarray, gdal, etc.) is most reliably built.
#
# Run `pixi install` to resolve and generate pixi.lock (NOT committed here -
# the lockfile is machine-generated; see README).

[workspace]
name = "disturbance-detection"
version = "0.1.0"
description = "Time-series change & disturbance detection over satellite NDVI cubes."
authors = ["Joseph Mbuh <mbuhjoe48@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tasks]
test = "pytest"
lint = "ruff check src tests && mypy src"
fmt = "ruff format src tests"
run = "disturb --config config/aoi.yaml"

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=1.24"
scipy = ">=1.10"
pandas = ">=2.0"
statsmodels = ">=0.14"
xarray = ">=2023.1"
dask = ">=2023.1"
rioxarray = ">=0.13"
rasterio = ">=1.3"
geopandas = ">=0.13"
odc-stac = ">=0.3"
pystac-client = ">=0.7"
planetary-computer = ">=1.0"
ruptures = ">=1.1"
matplotlib-base = ">=3.7"
pyyaml = ">=6.0"

[pypi-dependencies]
# Installed in editable mode so the `disturb` console script is available.
disturbance-detection = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=7.0"
ruff = ">=0.4"
mypy = ">=1.8"
pre-commit = ">=3.5"
jupyterlab = ">=4.0"

[environments]
default = { features = ["dev"], solve-group = "default" }
