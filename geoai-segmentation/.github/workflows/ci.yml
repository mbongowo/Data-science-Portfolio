name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint + test tooling (lightweight, no torch)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (src)
        run: mypy src || true   # type-only; non-blocking until full deps land

      - name: Run pure-python tests (torch tests skip gracefully)
        env:
          PYTHONPATH: src
        run: pytest -q

  smoke-train:
    # Realistic CPU smoke: install the full stack and run a 1-step fast_dev_run.
    # Heavy; kept on a single Python version. The pure tests above are the
    # guaranteed-green signal; a full smoke train needs torch + data.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Generate tiny synthetic data
        run: python scripts/prepare_data.py --synthetic --out data/spacenet --n 4
      - name: 1-step smoke train
        run: |
          python -m geoseg.train trainer.fast_dev_run=true \
            data.batch_size=2 data.num_workers=0 model.encoder_weights=null
