# pixi.toml — conda-forge environment for log-anomaly.
# Run `pixi install` to resolve and generate pixi.lock (NOT committed here;
# the lock is machine-generated). See README for details.

[workspace]
name = "log-anomaly"
version = "0.1.0"
description = "Unsupervised log anomaly detection: templating, event-count features, PCA / z-score detectors, optional Spark + IsolationForest."
authors = ["Joseph Mbuh <mbuhjoe48@gmail.com>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
# pyspark + the Java runtime resolve far more reliably from conda-forge than pip.
python = ">=3.10,<3.13"
numpy = ">=1.24"
pandas = ">=2.0"
pyyaml = ">=6.0"
pyspark = ">=3.5"
pyarrow = ">=14.0"
scikit-learn = ">=1.3"
matplotlib-base = ">=3.7"

[pypi-dependencies]
# Install the package itself (editable) into the environment.
log-anomaly = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=8.0"
ruff = ">=0.6"
mypy = ">=1.10"
pre-commit = ">=3.7"
ipykernel = ">=6.29"
jupyterlab = ">=4.0"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
demo = "loganomaly demo --out outputs"
test = "pytest"
lint = "ruff check . && mypy src"
format = "ruff format ."
parse = "loganomaly parse --config config/hdfs.yaml --out outputs"
detect = "loganomaly detect --config config/hdfs.yaml --out outputs"
evaluate = "loganomaly evaluate --config config/hdfs.yaml --out outputs"
