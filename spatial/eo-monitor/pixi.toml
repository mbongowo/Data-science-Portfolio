[workspace]
name = "eo-monitor"
version = "0.2.0"
description = "Config-driven Sentinel-2 vegetation/moisture anomaly monitoring (STAC -> COG)."
authors = ["Joseph Mbuh <mbuhjoe48@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[tasks]
# Mirror the Makefile verbs so `pixi run <verb>` works cross-platform.
run = "eo-monitor run --config config/corn_belt.yaml"
demo = "eo-monitor demo"
test = "pytest"
lint = "ruff check src tests && mypy"
format = "ruff format src tests"

[dependencies]
python = ">=3.10,<3.13"
pystac-client = ">=0.7"
planetary-computer = ">=1.0"
odc-stac = ">=0.3"
rioxarray = ">=0.15"
xarray = ">=2024.1"
dask = ">=2024.1"
numpy = ">=1.26"
rio-cogeo = ">=5.0"
rasterio = ">=1.3"
typer = ">=0.12"
pydantic = ">=2.6"
pydantic-settings = ">=2.2"
pyyaml = ">=6.0"
matplotlib = ">=3.8"

[pypi-dependencies]
# spyndex is not on conda-forge; install from PyPI within the pixi environment.
spyndex = ">=0.6"
eo-monitor = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=8.0"
ruff = ">=0.5"
mypy = ">=1.10"
pre-commit = ">=3.7"

[environments]
default = { features = ["dev"], solve-group = "default" }
