# pixi.toml -- conda-forge environment for eo-explorer-app.
#
# Run `pixi install` to resolve dependencies and GENERATE the pixi.lock file
# (the lockfile is intentionally NOT committed by hand -- pixi creates it).
#
# Tasks:
#   pixi run app    -> launch the Streamlit app
#   pixi run test   -> run the smoke tests
#   pixi run lint   -> ruff check

[workspace]
name = "eo-explorer-app"
version = "0.1.0"
description = "Interactive EO explorer: draw an AOI, pick a date, render a live Sentinel-2 spectral index on a map."
authors = ["Joseph Mbuh <mbuhjoe48@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]
app = "streamlit run app/main.py"
# Offline, deterministic demo: no network, no STAC. Writes outputs/summary.json.
demo = "python -m app.demo"
test = "pytest -q"
lint = "ruff check ."
format = "ruff format ."
# Install the reused flagship package from the sibling repo (editable).
install-eo-monitor = "pip install -e ../eo-monitor"

[dependencies]
python = ">=3.10,<3.13"
streamlit = ">=1.32"
streamlit-folium = ">=0.20"
folium = ">=0.16"
branca = ">=0.7"
pillow = ">=10.0"
pystac-client = ">=0.7"
odc-stac = ">=0.3.8"
rioxarray = ">=0.15"
xarray = ">=2024.1"
rasterio = ">=1.3"
numpy = ">=1.24"
matplotlib-base = ">=3.7"
dask = ">=2024.1"
pip = ">=26.1.2,<27"

[feature.dev.dependencies]
pytest = ">=8.0"
ruff = ">=0.4"
pre-commit = ">=3.7"
pip = "*"

[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

# Note on eo-monitor: the flagship index package is installed via pip (see the
# `install-eo-monitor` task or the README) rather than declared as a conda
# dependency, because it lives in a sibling git repo, not on conda-forge.
[pypi-dependencies]
# Uncomment to pull eo-monitor straight from GitHub instead of the local path:
# eo-monitor = { git = "https://github.com/mbongowo/Data-science-Portfolio.git", subdirectory = "eo-monitor", branch = "main" }
