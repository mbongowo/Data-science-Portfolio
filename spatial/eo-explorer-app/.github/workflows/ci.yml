name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    name: Lint + smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint + test tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy matplotlib

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # The smoke test only exercises the PURE helpers, so we deliberately do
      # NOT install streamlit/leafmap/pystac/odc-stac/eo-monitor here. The app
      # modules guard their heavy imports so collection + the pure tests pass
      # with just stdlib + numpy + matplotlib.
      - name: Smoke test (pure helpers)
        run: pytest -q
