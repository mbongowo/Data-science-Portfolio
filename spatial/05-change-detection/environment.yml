# Conda environment for the full SAR flood-mapping pipeline (STAC data path +
# notebook). The pure-numpy core and tests need only numpy/pandas/pyyaml, but
# this env resolves the whole geospatial stack from conda-forge, which handles
# GDAL/GEOS/PROJ far more reliably than pip wheels.
#
#   conda env create -f environment.yml
#   conda activate flood-change-detection
name: flood-change-detection
channels:
  - conda-forge
dependencies:
  - python>=3.10,<3.13
  - numpy>=1.24
  - pandas>=2.0
  - pyyaml>=6.0
  - pystac-client>=0.7
  - odc-stac>=0.3
  - rioxarray>=0.15
  - xarray>=2024.1
  - rasterio>=1.3
  - matplotlib>=3.7
  - jupyterlab>=4.0
  - pytest>=8.0
  - ruff>=0.6
  - pip
