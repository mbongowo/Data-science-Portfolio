# Conda environment for the full Douala SAM pipeline (segmentation + vectorise +
# notebook). The pure-numpy core and tests need only numpy/pandas/pyyaml, but
# this env resolves the whole geospatial + deep-learning stack from conda-forge,
# which handles GDAL/GEOS/PROJ and PyTorch far more reliably than pip wheels.
#
#   conda env create -f environment.yml
#   conda activate segment-geospatial
name: segment-geospatial
channels:
  - conda-forge
dependencies:
  - python>=3.10,<3.13
  - numpy>=1.24
  - pandas>=2.0
  - pyyaml>=6.0
  - rasterio>=1.3
  - geopandas>=0.14
  - shapely>=2.0
  - pytorch>=2.0
  - leafmap>=0.30
  - jupyterlab>=4.0
  - pytest>=8.0
  - ruff>=0.6
  - pip
  - pip:
      - segment-geospatial>=0.10
