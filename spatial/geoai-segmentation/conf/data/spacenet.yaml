# SpaceNet-style building-footprint dataset.
# Expects: ${data_dir}/images/*.tif and ${data_dir}/masks/*.tif (matching names).
data_dir: ./data/spacenet
tile_size: 256
stride: null                    # null -> non-overlapping tiles (stride = tile_size)
batch_size: 8
num_workers: 4

# Per-band normalisation stats (RGB). Recompute on your own data; these are
# reasonable defaults for 8-bit SpaceNet RGB after /255 scaling.
band_means: [0.485, 0.456, 0.406]
band_stds: [0.229, 0.224, 0.225]

# Deterministic split fractions (train, val, test).
split_fractions: [0.7, 0.15, 0.15]
