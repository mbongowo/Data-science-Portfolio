# Free local streaming stack — the HEAVY local path.
#
# This stands up the full real-time pipeline on your machine: a Redpanda broker
# (Kafka API, no ZooKeeper), a producer that polls the Open-Meteo Air Quality API
# and publishes readings to Kafka, a processor that windows them, computes the
# EPA AQI and runs the cooldown alert engine, a DuckDB-backed sink, and a small
# Streamlit dashboard reading the alerts. `docker compose config` validates this
# file; `docker compose up` runs the stack. The CI-tested core needs none of it —
# `python -m aqstream.cli demo` runs the same logic with no broker.

services:
  # Kafka-compatible broker (Redpanda: single binary, no ZooKeeper).
  broker:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://broker:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Polls Open-Meteo for each configured station and publishes readings.
  producer:
    build: .
    command: ["python", "-m", "aqstream.cli", "produce",
              "--lat", "9.3017", "--lon", "13.3921", "--station", "Garoua",
              "--topic", "aqstream.readings", "--brokers", "broker:9092"]
    environment:
      KAFKA_BROKERS: "broker:9092"
    depends_on:
      broker:
        condition: service_healthy

  # Windows -> EPA AQI -> alert engine (cooldown) -> sink + notify.
  processor:
    build: .
    command: ["python", "-m", "aqstream.cli", "process",
              "--topic", "aqstream.readings", "--brokers", "broker:9092"]
    environment:
      KAFKA_BROKERS: "broker:9092"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-}"
    volumes:
      - sink-data:/data
    depends_on:
      broker:
        condition: service_healthy

  # Streamlit view of the alerts and hourly AQI written by the sink.
  dashboard:
    build: .
    command: ["streamlit", "run", "app/dashboard.py",
              "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    volumes:
      - sink-data:/data
    depends_on:
      - processor

volumes:
  sink-data:
