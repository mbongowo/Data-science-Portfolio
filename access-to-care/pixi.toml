[workspace]
name = "access-to-care"
version = "0.1.0"
description = "Travel-time-to-care accessibility and equity analysis for Cameroon"
authors = ["Joseph Mbuh <mbuhjoe48@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]
download = "python data/download.py"
network = "python -m access.network"
access = "python -m access.access"
test = "pytest -q"
lint = "ruff check src tests && mypy src"
format = "ruff format src tests"

# Geospatial stack from conda-forge (mirrors pyproject dependencies).
[dependencies]
python = ">=3.10,<3.13"
osmnx = ">=1.9"
networkx = ">=3.2"
geopandas = ">=0.14"
shapely = ">=2.0"
pyproj = ">=3.6"
h3-py = ">=3.7"
rasterstats = ">=0.19"
rasterio = ">=1.3"
matplotlib-base = ">=3.8"
contextily = ">=1.5"
folium = ">=0.15"
numpy = ">=1.26"
pandas = ">=2.1"
pyyaml = ">=6.0"
requests = ">=2.31"
tqdm = ">=4.66"

[feature.dev.dependencies]
pytest = ">=8.0"
ruff = ">=0.5"
mypy = ">=1.10"
pre-commit = ">=3.7"

[environments]
default = { features = ["dev"], solve-group = "default" }
