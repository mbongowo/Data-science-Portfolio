name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - eo-monitor
          - access-to-care
          - spatial-hotspots
          - geoai-segmentation
          - disturbance-detection
          - eo-explorer-app
          - clickstream-pipeline
          - log-anomaly
          - als-recommender
          - sentiment-scale
          - tlc-analytics
          - dbt-modern-stack
          - crypto-backtest
          - graph-analysis
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Only the dependencies the pure-numerical test suites need. The full
      # geospatial and ML stacks are not installed here; tests that require them
      # are guarded and skip. See each project's USAGE.md to run the full pipeline.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyyaml pydantic pydantic-settings typer pytest ruff

      - name: Lint
        working-directory: ${{ matrix.project }}
        run: ruff check . || true

      - name: Test
        working-directory: ${{ matrix.project }}
        # Most projects use a src/ layout; eo-explorer-app keeps its package
        # at the project root (app/). Put both on the path.
        env:
          PYTHONPATH: src:.
        run: pytest tests -q
