name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - spatial/eo-monitor
          - spatial/access-to-care
          - spatial/spatial-hotspots
          - spatial/geoai-segmentation
          - spatial/disturbance-detection
          - spatial/eo-explorer-app
          - spatial/01-segment-geospatial
          - spatial/02-earth-engine-timeseries
          - non-spatial/clickstream-pipeline
          - non-spatial/log-anomaly
          - non-spatial/als-recommender
          - non-spatial/sentiment-scale
          - non-spatial/tlc-analytics
          - non-spatial/dbt-modern-stack
          - non-spatial/crypto-backtest
          - non-spatial/graph-analysis
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Only the dependencies the pure-numerical test suites need. The full
      # geospatial and ML stacks are not installed here; tests that require them
      # are guarded and skip. See each project's USAGE.md to run the full pipeline.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyyaml pydantic pydantic-settings typer pytest ruff

      - name: Lint
        working-directory: ${{ matrix.project }}
        run: ruff check . || true

      - name: Test
        working-directory: ${{ matrix.project }}
        # Most projects use a src/ layout; eo-explorer-app keeps its package
        # at the project root (app/). Put both on the path.
        env:
          PYTHONPATH: src:.
        run: pytest tests -q
